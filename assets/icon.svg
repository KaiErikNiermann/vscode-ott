<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Inference rule: premise -->
  <text x="128" y="95" text-anchor="middle"
        font-family="'Latin Modern Math','Cambria Math','STIX Two Math','serif'"
        font-size="30" fill="#8cb4d8" font-style="italic"
        letter-spacing="1">Γ ⊢ e : τ</text>

  <!-- Inference rule: horizontal bar -->
  <line x1="48" y1="115" x2="208" y2="115"
        stroke="#5a9fd4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Inference rule: conclusion -->
  <text x="128" y="148" text-anchor="middle"
        font-family="'Latin Modern Math','Cambria Math','STIX Two Math','serif'"
        font-size="30" fill="#8cb4d8" font-style="italic"
        letter-spacing="1">Γ ⊢ e' : τ'</text>

  <!-- "Ott" text -->
  <text x="128" y="210" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Cascadia Code','monospace'"
        font-size="56" fill="#e8eef4" font-weight="700"
        letter-spacing="6">Ott</text>
</svg>
