version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
    ignore:
      # The LSP stack version is dictated by langium (it pins vscode-languageserver@~9,
      # protocol ~3.17.5, jsonrpc ~8.2.0). The extension passes its connection into
      # langium's service factory, so these must share langium's LSP types. Major bumps
      # here break that compatibility — only move them when langium itself upgrades.
      - dependency-name: vscode-languageserver
        update-types:
          - version-update:semver-major
      - dependency-name: vscode-languageclient
        update-types:
          - version-update:semver-major
      - dependency-name: vscode-languageserver-protocol
        update-types:
          - version-update:semver-major
      - dependency-name: vscode-jsonrpc
        update-types:
          - version-update:semver-major
      # @types/vscode is coupled to engines.vscode in packages/extension: vsce
      # refuses to package when @types/vscode is newer than the declared engine
      # floor (^1.110.0). @types/vscode ships one minor per VS Code minor, so
      # ignore minor+major bumps — raise both together by hand when lifting the
      # minimum supported VS Code version.
      - dependency-name: '@types/vscode'
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - '*'
    labels:
      - dependencies
