version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
    ignore:
      # The LSP stack version is dictated by langium, which pins it at PATCH level
      # (4.3.1 -> vscode-languageserver@~10.0.1, protocol ~3.18, jsonrpc ~9). The
      # extension passes its connection into langium's service factory, so a duplicate
      # LSP version makes the `_Connection`/protocol/jsonrpc types diverge and the build
      # fails. Because langium's range is patch-only, even a MINOR bump (e.g. 10.0 -> 10.1)
      # breaks it — so ignore minor+major and only move these by hand when langium upgrades.
      - dependency-name: vscode-languageserver
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: vscode-languageclient
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: vscode-languageserver-protocol
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: vscode-jsonrpc
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      # @types/vscode is coupled to engines.vscode in packages/extension: vsce
      # refuses to package when @types/vscode is newer than the declared engine
      # floor (^1.110.0). @types/vscode ships one minor per VS Code minor, so
      # ignore minor+major bumps — raise both together by hand when lifting the
      # minimum supported VS Code version.
      - dependency-name: '@types/vscode'
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - '*'
    labels:
      - dependencies
